specVersion: 0.0.5
schema:
  file: ./schema.graphql

dataSources:
  - kind: ethereum
    name: OrbittMarket
    network: 0gTestnet
    source:
      address: "0xfc88F76d6908330DDcf9fF83B46Dce8E04369Be3"
      abi: OrbittMarket
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Job
        - Agent
      abis:
        - name: OrbittMarket
          file: ./abis/OrbittMarket.json
      eventHandlers:
        - event: JobPosted(indexed uint256,indexed address,indexed address,uint256,bytes32,uint256)
          handler: handleJobPosted
        - event: BidAssigned(indexed uint256,indexed uint256)
          handler: handleBidAccepted
        - event: EscrowReleased(indexed uint256,indexed address,uint256)
          handler: handleEscrowReleased
      file: ./src/mapping.ts
  - kind: ethereum
    name: OrbittRegistry
    network: 0gTestnet
    source:
      address: "0xAb627517D7dbd4521F4BA1825275B64b7cB5eC00"
      abi: OrbittRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
      abis:
        - name: OrbittRegistry
          file: ./abis/OrbittRegistry.json
      eventHandlers:
        - event: MetadataUpdated(indexed uint256,bytes32,string)
          handler: handleMetadataUpdated
      file: ./src/mapping.ts
  - kind: ethereum
    name: OrbittSubnameRegistrar
    network: 0gTestnet
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: OrbittSubnameRegistrar
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Agent
        - ReputationEvent
      abis:
        - name: OrbittSubnameRegistrar
          file: ./abis/OrbittSubnameRegistrar.json
      eventHandlers:
        - event: SubnameRegistered(indexed bytes32,string,uint256,indexed address)
          handler: handleSubnameRegistered
        - event: ReputationScoreUpdated(indexed bytes32,string,uint256)
          handler: handleReputationUpdated
      file: ./src/mapping.ts
